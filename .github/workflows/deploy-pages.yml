name: Publicar site de homologacao

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v6

      - name: Configurar Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Configurar pnpm
        uses: pnpm/action-setup@v6

      - name: Conferir ambiente
        run: |
          node --version
          pnpm --version

      - name: Preservar imagens do site atual
        shell: bash
        run: |
          mkdir -p client/public/manus-storage
          baixar() {
            origem="$1"
            destino="$2"
            if ! curl --fail --location --silent --show-error --retry 2 "$origem" -o "$destino"; then
              echo "Aviso: nao foi possivel baixar $origem"
              rm -f "$destino"
            fi
          }
          baixar "https://eufrauzinoadvogados.com/manus-storage/logo_bcc5d4e0.webp" "client/public/manus-storage/logo_bcc5d4e0.webp"
          baixar "https://eufrauzinoadvogados.com/manus-storage/jurandi_c804fd7e.jpeg" "client/public/manus-storage/jurandi_c804fd7e.jpeg"
          baixar "https://eufrauzinoadvogados.com/manus-storage/thiago_d4952930.jpeg" "client/public/manus-storage/thiago_d4952930.jpeg"
          baixar "https://eufrauzinoadvogados.com/manus-storage/victoria_2ff9d290.jpeg" "client/public/manus-storage/victoria_2ff9d290.jpeg"
          baixar "https://eufrauzinoadvogados.com/manus-storage/dalton_c1f9702c.jpeg" "client/public/manus-storage/dalton_c1f9702c.jpeg"
          baixar "https://eufrauzinoadvogados.com/manus-storage/dinara_5c8a199c.jpeg" "client/public/manus-storage/dinara_5c8a199c.jpeg"

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Gerar site
        run: pnpm build

      - name: Preparar GitHub Pages
        shell: bash
        run: |
          sed -i 's#="/assets/#="/eufrauzino-advogados/assets/#g' dist/public/index.html
          if [ -d dist/public/assets ]; then
            grep -RIl '/manus-storage/' dist/public/assets | xargs -r sed -i 's#/manus-storage/#/eufrauzino-advogados/manus-storage/#g'
          fi
          cp dist/public/index.html dist/public/404.html
          touch dist/public/.nojekyll

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Enviar artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
