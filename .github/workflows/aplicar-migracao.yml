name: Aplicar migracao independente

on:
  push:
    branches: [substituicao-independente]
    paths: [.github/workflows/aplicar-migracao.yml, .github/workflows/.aplicar-migracao-trigger]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: substituicao-independente

      - name: Aplicar arquivos da versao independente
        shell: bash
        run: |
          set -e
          cat > /tmp/site-text.b64 <<'EOF'
[... ELLIPSIZATION ...]
EOF
          base64 -d /tmp/site-text.b64 > /tmp/site-text.tar.gz
          tar -xzf /tmp/site-text.tar.gz -C .
          rm -f client/public/__manus__/debug-collector.js
          rm -f client/src/components/ManusDialog.tsx
          rm -f client/src/components/Map.tsx

      - name: Registrar migracao
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: remover dependencias do Manus e usar ativos locais" || exit 0
          git push origin substituicao-independente
