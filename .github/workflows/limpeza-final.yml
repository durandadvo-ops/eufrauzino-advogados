name: Limpeza tecnica final

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/limpeza-final.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  limpar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - uses: pnpm/action-setup@v6

      - name: Remover residuos do Manus
        shell: bash
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require('fs');
          const packagePath = 'package.json';
          const pkg = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
          for (const name of [
            '@builder.io/vite-plugin-jsx-loc',
            '@types/google.maps',
            'vite-plugin-manus-runtime'
          ]) {
            if (pkg.devDependencies) delete pkg.devDependencies[name];
          }
          fs.writeFileSync(packagePath, JSON.stringify(pkg, null, 2) + '\n');
          NODE

          python3 <<'PY'
          from pathlib import Path

          home = Path('client/src/pages/Home.tsx')
          text = home.read_text()
          external = "backgroundImage: \"url('https://d2xsxph8kpxj0f.cloudfront.net/310419663028514422/Xzf9P38Xn33iCo76CY2Lsf/hero-with-e-letter-nMz7UMSLSVzW6Q5qMFzkkA.webp')\"," 
          local = 'backgroundImage: "radial-gradient(circle at 50% 32%, rgba(107, 30, 44, 0.16), transparent 42%), linear-gradient(135deg, rgba(250, 247, 242, 0.98), rgba(229, 217, 204, 0.96))",'
          if external not in text:
              raise SystemExit('Fundo externo da pagina inicial nao localizado')
          home.write_text(text.replace(external, local))
          PY

          rm -f client/src/components/Map.tsx
          pnpm install --lockfile-only --no-frozen-lockfile
          VITE_BASE_PATH=/eufrauzino-advogados/ pnpm build
          rm -f .github/workflows/limpeza-final.yml

      - name: Gravar limpeza
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "ChatGPT Site Maintenance"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "chore: concluir limpeza tecnica e remover residuos do Manus"
          git push origin main
